name: "🚀 Deploy to AWS EC2"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Checkout code"
        uses: actions/checkout@v4

      - name: "🚀 Deploy to EC2"
        uses: appleboy/ssh-action@v1.2.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Direct Postgres connection used by the auto-migration runner on
          # boot. Grab the value from Supabase Dashboard → Settings →
          # Database → Connect → Session pooler URI (replace [YOUR-PASSWORD]
          # with the real password). Store as a GitHub repo secret named
          # SUPABASE_DB_URL and it propagates to EC2 on every deploy.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # Auto-Clip feature keys. Both are OPTIONAL — the pipeline falls
          # back gracefully when they're absent (Whisper → Gemini audio
          # fallback; Sieve face-tracked reframe → ffmpeg centre-crop).
          # Set them in GitHub repo secrets when you're ready to switch on
          # the premium path.
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          SIEVE_API_KEY: ${{ secrets.SIEVE_API_KEY }}
          # AI Video Generator (Phase 2). ElevenLabs powers the TTS voice-over
          # step — OPTIONAL. When missing the pipeline simply produces a
          # silent video (user can still opt-out via the form).
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_DEFAULT_VOICE: ${{ secrets.ELEVENLABS_DEFAULT_VOICE }}
          # Grok Imagine (xAI) — 4th motion provider option. Named
          # REPLICATE_API_TOKEN_GROK for naming consistency with the
          # Replicate token even though Grok is xAI's own API.
          REPLICATE_API_TOKEN_GROK: ${{ secrets.REPLICATE_API_TOKEN_GROK }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          envs: GEMINI_API_KEY,YOUTUBE_API_KEY,SUPABASE_DB_URL,REPLICATE_API_TOKEN,SIEVE_API_KEY,ELEVENLABS_API_KEY,ELEVENLABS_DEFAULT_VOICE,REPLICATE_API_TOKEN_GROK
          script: |
            echo "========================================="
            echo "🚀 Starting deployment..."
            echo "========================================="

            cd /home/ubuntu/AI-avaatar-generation

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Update GEMINI_API_KEY in .env
            if [ -n "$GEMINI_API_KEY" ]; then
              echo "🔑 Updating GEMINI_API_KEY..."
              if [ -f .env ] && grep -q "^GEMINI_API_KEY=" .env; then
                sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=$GEMINI_API_KEY|" .env
              else
                echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
              fi
            fi

            # Update YOUTUBE_API_KEY in .env
            if [ -n "$YOUTUBE_API_KEY" ]; then
              echo "🔑 Updating YOUTUBE_API_KEY..."
              if [ -f .env ] && grep -q "^YOUTUBE_API_KEY=" .env; then
                sed -i "s|^YOUTUBE_API_KEY=.*|YOUTUBE_API_KEY=$YOUTUBE_API_KEY|" .env
              else
                echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY" >> .env
              fi
            fi

            # Update SUPABASE_DB_URL in .env — enables auto-migrations on boot.
            # Uses '|' as the sed delimiter because the URL contains '/' and '@'.
            if [ -n "$SUPABASE_DB_URL" ]; then
              echo "🔑 Updating SUPABASE_DB_URL..."
              if [ -f .env ] && grep -q "^SUPABASE_DB_URL=" .env; then
                sed -i "s|^SUPABASE_DB_URL=.*|SUPABASE_DB_URL=$SUPABASE_DB_URL|" .env
              else
                echo "SUPABASE_DB_URL=$SUPABASE_DB_URL" >> .env
              fi
            fi

            # Update REPLICATE_API_TOKEN in .env — used by Auto-Clip (Whisper)
            # and the existing Kling video engine.
            if [ -n "$REPLICATE_API_TOKEN" ]; then
              echo "🔑 Updating REPLICATE_API_TOKEN..."
              if [ -f .env ] && grep -q "^REPLICATE_API_TOKEN=" .env; then
                sed -i "s|^REPLICATE_API_TOKEN=.*|REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN|" .env
              else
                echo "REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN" >> .env
              fi
            fi

            # Update SIEVE_API_KEY in .env — enables face-aware 9:16 reframe.
            if [ -n "$SIEVE_API_KEY" ]; then
              echo "🔑 Updating SIEVE_API_KEY..."
              if [ -f .env ] && grep -q "^SIEVE_API_KEY=" .env; then
                sed -i "s|^SIEVE_API_KEY=.*|SIEVE_API_KEY=$SIEVE_API_KEY|" .env
              else
                echo "SIEVE_API_KEY=$SIEVE_API_KEY" >> .env
              fi
            fi

            # Update ELEVENLABS_API_KEY in .env — enables AI-video voice-over.
            if [ -n "$ELEVENLABS_API_KEY" ]; then
              echo "🔑 Updating ELEVENLABS_API_KEY..."
              if [ -f .env ] && grep -q "^ELEVENLABS_API_KEY=" .env; then
                sed -i "s|^ELEVENLABS_API_KEY=.*|ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY|" .env
              else
                echo "ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY" >> .env
              fi
            fi

            # Update ELEVENLABS_DEFAULT_VOICE in .env — overrides the default voice id.
            if [ -n "$ELEVENLABS_DEFAULT_VOICE" ]; then
              echo "🔑 Updating ELEVENLABS_DEFAULT_VOICE..."
              if [ -f .env ] && grep -q "^ELEVENLABS_DEFAULT_VOICE=" .env; then
                sed -i "s|^ELEVENLABS_DEFAULT_VOICE=.*|ELEVENLABS_DEFAULT_VOICE=$ELEVENLABS_DEFAULT_VOICE|" .env
              else
                echo "ELEVENLABS_DEFAULT_VOICE=$ELEVENLABS_DEFAULT_VOICE" >> .env
              fi
            fi

            # Update REPLICATE_API_TOKEN_GROK in .env — 4th motion provider (Grok Imagine / xAI).
            if [ -n "$REPLICATE_API_TOKEN_GROK" ]; then
              echo "🔑 Updating REPLICATE_API_TOKEN_GROK..."
              if [ -f .env ] && grep -q "^REPLICATE_API_TOKEN_GROK=" .env; then
                sed -i "s|^REPLICATE_API_TOKEN_GROK=.*|REPLICATE_API_TOKEN_GROK=$REPLICATE_API_TOKEN_GROK|" .env
              else
                echo "REPLICATE_API_TOKEN_GROK=$REPLICATE_API_TOKEN_GROK" >> .env
              fi
            fi

            echo "🐳 Rebuilding Docker container..."
            docker compose down
            docker compose up -d --build

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "⏳ Waiting for container to start..."
            sleep 10

            echo "✅ Verifying deployment..."
            if curl -s http://localhost:8000/ | grep -q "Ready"; then
              echo "✅ Deployment successful! API is online."
            else
              echo "❌ Deployment may have failed. Check logs with: docker compose logs"
              exit 1
            fi

            echo "========================================="
            echo "🎉 Deployment complete!"
            echo "========================================="
