name: "ЁЯЪА Deploy to AWS EC2"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: "ЁЯУж Checkout code"
        uses: actions/checkout@v4

      - name: "ЁЯЪА Deploy to EC2"
        uses: appleboy/ssh-action@v1.2.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Direct Postgres connection used by the auto-migration runner on
          # boot. Grab the value from Supabase Dashboard тЖТ Settings тЖТ
          # Database тЖТ Connect тЖТ Session pooler URI (replace [YOUR-PASSWORD]
          # with the real password). Store as a GitHub repo secret named
          # SUPABASE_DB_URL and it propagates to EC2 on every deploy.
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # Auto-Clip feature keys. Both are OPTIONAL тАФ the pipeline falls
          # back gracefully when they're absent (Whisper тЖТ Gemini audio
          # fallback; Sieve face-tracked reframe тЖТ ffmpeg centre-crop).
          # Set them in GitHub repo secrets when you're ready to switch on
          # the premium path.
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          SIEVE_API_KEY: ${{ secrets.SIEVE_API_KEY }}
          # AI Video Generator (Phase 2). ElevenLabs powers the TTS voice-over
          # step тАФ OPTIONAL. When missing the pipeline simply produces a
          # silent video (user can still opt-out via the form).
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_DEFAULT_VOICE: ${{ secrets.ELEVENLABS_DEFAULT_VOICE }}
          # Grok Imagine (xAI) тАФ 4th motion provider option. Named
          # REPLICATE_API_TOKEN_GROK for naming consistency with the
          # Replicate token even though Grok is xAI's own API.
          REPLICATE_API_TOKEN_GROK: ${{ secrets.REPLICATE_API_TOKEN_GROK }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          envs: GEMINI_API_KEY,YOUTUBE_API_KEY,SUPABASE_DB_URL,REPLICATE_API_TOKEN,SIEVE_API_KEY,ELEVENLABS_API_KEY,ELEVENLABS_DEFAULT_VOICE,REPLICATE_API_TOKEN_GROK
          script: |
            echo "========================================="
            echo "ЁЯЪА Starting deployment..."
            echo "========================================="

            cd /home/ubuntu/AI-avaatar-generation

            echo "ЁЯУе Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Update GEMINI_API_KEY in .env
            if [ -n "$GEMINI_API_KEY" ]; then
              echo "ЁЯФС Updating GEMINI_API_KEY..."
              if [ -f .env ] && grep -q "^GEMINI_API_KEY=" .env; then
                sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=$GEMINI_API_KEY|" .env
              else
                echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
              fi
            fi

            # Update YOUTUBE_API_KEY in .env
            if [ -n "$YOUTUBE_API_KEY" ]; then
              echo "ЁЯФС Updating YOUTUBE_API_KEY..."
              if [ -f .env ] && grep -q "^YOUTUBE_API_KEY=" .env; then
                sed -i "s|^YOUTUBE_API_KEY=.*|YOUTUBE_API_KEY=$YOUTUBE_API_KEY|" .env
              else
                echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY" >> .env
              fi
            fi

            # Update SUPABASE_DB_URL in .env тАФ enables auto-migrations on boot.
            # Uses '|' as the sed delimiter because the URL contains '/' and '@'.
            if [ -n "$SUPABASE_DB_URL" ]; then
              echo "ЁЯФС Updating SUPABASE_DB_URL..."
              if [ -f .env ] && grep -q "^SUPABASE_DB_URL=" .env; then
                sed -i "s|^SUPABASE_DB_URL=.*|SUPABASE_DB_URL=$SUPABASE_DB_URL|" .env
              else
                echo "SUPABASE_DB_URL=$SUPABASE_DB_URL" >> .env
              fi
            fi

            # Update REPLICATE_API_TOKEN in .env тАФ used by Auto-Clip (Whisper)
            # and the existing Kling video engine.
            if [ -n "$REPLICATE_API_TOKEN" ]; then
              echo "ЁЯФС Updating REPLICATE_API_TOKEN..."
              if [ -f .env ] && grep -q "^REPLICATE_API_TOKEN=" .env; then
                sed -i "s|^REPLICATE_API_TOKEN=.*|REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN|" .env
              else
                echo "REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN" >> .env
              fi
            fi

            # Update SIEVE_API_KEY in .env тАФ enables face-aware 9:16 reframe.
            if [ -n "$SIEVE_API_KEY" ]; then
              echo "ЁЯФС Updating SIEVE_API_KEY..."
              if [ -f .env ] && grep -q "^SIEVE_API_KEY=" .env; then
                sed -i "s|^SIEVE_API_KEY=.*|SIEVE_API_KEY=$SIEVE_API_KEY|" .env
              else
                echo "SIEVE_API_KEY=$SIEVE_API_KEY" >> .env
              fi
            fi

            # Update ELEVENLABS_API_KEY in .env тАФ enables AI-video voice-over.
            if [ -n "$ELEVENLABS_API_KEY" ]; then
              echo "ЁЯФС Updating ELEVENLABS_API_KEY..."
              if [ -f .env ] && grep -q "^ELEVENLABS_API_KEY=" .env; then
                sed -i "s|^ELEVENLABS_API_KEY=.*|ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY|" .env
              else
                echo "ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY" >> .env
              fi
            fi

            # Update ELEVENLABS_DEFAULT_VOICE in .env тАФ overrides the default voice id.
            if [ -n "$ELEVENLABS_DEFAULT_VOICE" ]; then
              echo "ЁЯФС Updating ELEVENLABS_DEFAULT_VOICE..."
              if [ -f .env ] && grep -q "^ELEVENLABS_DEFAULT_VOICE=" .env; then
                sed -i "s|^ELEVENLABS_DEFAULT_VOICE=.*|ELEVENLABS_DEFAULT_VOICE=$ELEVENLABS_DEFAULT_VOICE|" .env
              else
                echo "ELEVENLABS_DEFAULT_VOICE=$ELEVENLABS_DEFAULT_VOICE" >> .env
              fi
            fi

            # Update REPLICATE_API_TOKEN_GROK in .env тАФ 4th motion provider (Grok Imagine / xAI).
            if [ -n "$REPLICATE_API_TOKEN_GROK" ]; then
              echo "ЁЯФС Updating REPLICATE_API_TOKEN_GROK..."
              if [ -f .env ] && grep -q "^REPLICATE_API_TOKEN_GROK=" .env; then
                sed -i "s|^REPLICATE_API_TOKEN_GROK=.*|REPLICATE_API_TOKEN_GROK=$REPLICATE_API_TOKEN_GROK|" .env
              else
                echo "REPLICATE_API_TOKEN_GROK=$REPLICATE_API_TOKEN_GROK" >> .env
              fi
            fi

            echo "ЁЯР│ Rebuilding Docker container..."
            docker compose down
            docker compose up -d --build

            echo "ЁЯз╣ Cleaning up old images..."
            docker image prune -f

            # Healthcheck with retry loop. Old version did `sleep 10` + a
            # single curl, which broke on t3.micro because cold-start +
            # auto-migrations regularly take > 10s when the box is RAM-
            # constrained. Now we poll for up to 90s and dump container
            # logs on failure so the real cause (OOM / Python exception /
            # migration error) lands in the GitHub Actions output instead
            # of forcing an SSH session to debug.
            echo "тП│ Waiting for container to become healthy (up to 90s)..."
            HEALTHY=0
            for i in $(seq 1 45); do
              if curl -fsS http://localhost:8000/ 2>/dev/null | grep -q "Ready"; then
                echo "тЬЕ API is online after ~$((i*2))s"
                HEALTHY=1
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "тЭМ Container did not become healthy within 90s."
              echo "тФАтФАтФА docker compose ps тФАтФАтФА"
              docker compose ps || true
              echo "тФАтФАтФА last 80 log lines (api) тФАтФАтФА"
              docker compose logs --tail=80 api || true
              echo "тФАтФАтФА system memory тФАтФАтФА"
              free -h || true
              exit 1
            fi

            echo "========================================="
            echo "ЁЯОЙ Deployment complete!"
            echo "========================================="
