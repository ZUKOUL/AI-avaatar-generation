name: "\U0001F680 Deploy to AWS EC2"

# Trigger: only on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the latest code
      - name: "\U0001F4E6 Checkout code"
        uses: actions/checkout@v4

      # Step 2: Deploy to EC2 via SSH
      - name: "\U0001F680 Deploy to EC2"
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            echo "========================================="
            echo "🚀 Starting deployment..."
            echo "========================================="

            # Navigate to project directory
            cd /home/ubuntu/AI-avaatar-generation

            # Pull the latest code from main
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart the Docker container
            echo "🐳 Rebuilding Docker container..."
            docker compose down
            docker compose up -d --build

            # Clean up old Docker images to save disk space
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Wait for container to be healthy
            echo "⏳ Waiting for container to start..."
            sleep 10

            # Verify the deployment
            echo "✅ Verifying deployment..."
            if curl -s http://localhost:8000/ | grep -q "Ready"; then
              echo "✅ Deployment successful! API is online."
            else
              echo "❌ Deployment may have failed. Check logs with: docker compose logs"
              exit 1
            fi

            echo "========================================="
            echo "🎉 Deployment complete!"
            echo "========================================="
